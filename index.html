<!DOCTYPE html>
<html>
<head><title>Bridge Detect v4</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:monospace;font-size:14px;padding:10px;background:#111;color:#0f0}
h1{font-size:18px}
.found{color:#0f0} .missing{color:#555}
#log{white-space:pre-wrap;word-break:break-all}
button{font-size:16px;padding:10px 20px;margin:5px;background:#222;color:#0f0;border:1px solid #0f0}
</style>
</head>
<body>
<h1 id="status">Detecting bridges...</h1>
<div id="bridges"></div>
<hr>
<h1>Test Individual Bridges</h1>
<p>Tap a button to test ONE bridge at a time (safe, won't crash):</p>
<div id="buttons"></div>
<hr>
<h1>Results</h1>
<pre id="log">Waiting for test...</pre>

<script>
// v4: detect only, test one at a time via buttons
var bridges = [
  {name:'_solana_', label:'Solana'},
  {name:'okxBtcJSBridge', label:'BTC'},
  {name:'okxStarkJSBridge', label:'StarkNet'},
  {name:'_aptos_', label:'Aptos'},
  {name:'_okx_sui_', label:'SUI'},
  {name:'tron', label:'Tron'},
  {name:'okxOsmosJSBridge', label:'Osmosis'},
  {name:'okxNostrJSBridge', label:'Nostr'},
  {name:'okxInternalJSBridge', label:'Internal'},
  {name:'interception', label:'Interception'},
  {name:'native', label:'Native'},
  {name:'okxInternalProvider', label:'InternalProvider'},
  {name:'okxTonJSBridge', label:'TON'},
  {name:'AndroidApi', label:'AndroidApi'}
];

// Step 1: detect all bridges (typeof only, no calls)
var detected = [];
var html = '';
bridges.forEach(function(b) {
  var t = typeof window[b.name];
  var has = t !== 'undefined';
  if (has) detected.push(b);
  html += '<div class="' + (has ? 'found' : 'missing') + '">' +
    (has ? '[+]' : '[-]') + ' ' + b.label + ' (' + b.name + '): ' + t;
  if (has && typeof window[b.name] === 'object') {
    try {
      var keys = Object.getOwnPropertyNames(window[b.name]);
      html += ' keys=[' + keys.join(',') + ']';
    } catch(e) { html += ' keys=err'; }
  }
  html += '</div>';
});
document.getElementById('status').textContent = 'Detected: ' + detected.length + '/' + bridges.length;
document.getElementById('bridges').innerHTML = html;

// Step 2: create test buttons for each detected bridge
var btnDiv = document.getElementById('buttons');
var logEl = document.getElementById('log');
var testLog = [];

function addLog(msg) {
  testLog.push('[' + new Date().toLocaleTimeString() + '] ' + msg);
  logEl.textContent = testLog.join('\n');
}

// Listen for async responses
window.addEventListener('message', function(e) {
  addLog('ASYNC MSG: origin=' + e.origin + ' data=' + JSON.stringify(e.data).substring(0, 300));
});

detected.forEach(function(b) {
  // Skip ones we know are dangerous
  if (b.name === 'okxInternalProvider') return; // crashes app
  if (b.name === 'interception') return; // not a bridge
  if (b.name === 'native') return; // H5 only

  var btn = document.createElement('button');
  btn.textContent = 'Test ' + b.label;
  btn.onclick = function() {
    addLog('--- Testing ' + b.label + ' (' + b.name + ') ---');
    try {
      var obj = window[b.name];
      // Log all properties
      addLog('Type: ' + typeof obj);
      try {
        addLog('Keys: ' + Object.getOwnPropertyNames(obj).join(', '));
      } catch(e) { addLog('Keys error: ' + e.message); }

      // Try postMessage if available
      if (typeof obj.postMessage === 'function') {
        addLog('postMessage exists, calling connect...');
        try {
          var r = obj.postMessage(JSON.stringify({method:'connect', params:{}}));
          addLog('connect result: ' + JSON.stringify(r));
        } catch(e) { addLog('connect error: ' + e.message); }
      } else {
        addLog('No postMessage method');
      }
    } catch(e) {
      addLog('ERROR: ' + e.message);
    }
  };
  btnDiv.appendChild(btn);
});

// Special button: test getTK via internal bridge
if (typeof window.okxInternalJSBridge !== 'undefined') {
  var btn2 = document.createElement('button');
  btn2.textContent = 'Test getTK (Internal)';
  btn2.style.background = '#330';
  btn2.onclick = function() {
    addLog('--- Testing okxInternalJSBridge getTK ---');
    try {
      var r = window.okxInternalJSBridge.postMessage(JSON.stringify({uri:'request', method:'getTK', data:[]}));
      addLog('getTK result: ' + JSON.stringify(r));
    } catch(e) { addLog('getTK error: ' + e.message); }
    try {
      var r2 = window.okxInternalJSBridge.postMessage(JSON.stringify({uri:'request', method:'getUserInfo', data:[]}));
      addLog('getUserInfo result: ' + JSON.stringify(r2));
    } catch(e) { addLog('getUserInfo error: ' + e.message); }
  };
  btnDiv.appendChild(btn2);
}

// Special button: enumerate ALL window properties for hidden bridges
var btnAll = document.createElement('button');
btnAll.textContent = 'Scan ALL window props';
btnAll.style.background = '#033';
btnAll.onclick = function() {
  addLog('--- Scanning window properties ---');
  var interesting = [];
  var allKeys = Object.getOwnPropertyNames(window);
  addLog('Total window props: ' + allKeys.length);
  allKeys.forEach(function(k) {
    try {
      var v = window[k];
      if (v && typeof v === 'object' && typeof v.postMessage === 'function' && k !== 'window' && k !== 'self' && k !== 'frames' && k !== 'parent' && k !== 'top') {
        interesting.push(k + ' (' + typeof v + ')');
      }
    } catch(e) {}
  });
  addLog('Objects with postMessage: ' + JSON.stringify(interesting));
};
btnDiv.appendChild(btnAll);

document.title = 'v4:' + detected.length + 'bridges';
</script>
</body>
</html>
